# ============================================================
# SkillBridge — GitLab CI/CD Pipeline
# ============================================================

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""
  ECR_REGISTRY: "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
  K8S_NAMESPACE: skillbridge

stages:
  - test
  - build
  - push
  - deploy

# ─── SHARED BEFORE_SCRIPT (loads DB schema) ──────────────────
.load_schema: &load_schema
  - apk add --no-cache postgresql-client
  - |
    echo "Waiting for Postgres..."
    for i in $(seq 1 30); do
      pg_isready -h postgres -U postgres && break
      echo "  attempt $i/30..."
      sleep 2
    done
  - PGPASSWORD=postgres psql -h postgres -U postgres -d skillbridge -f backend/db/data.sql
  - echo "Schema loaded"

# ─── SHARED POSTGRES SERVICE ─────────────────────────────────
.postgres_service: &postgres_service
  - name: postgres:15
    alias: postgres
    variables:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: skillbridge

# ─── SHARED AWS SETUP ────────────────────────────────────────
.aws_setup: &aws_setup
  before_script:
    - apk add --no-cache curl unzip
    - curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
    - unzip -q awscliv2.zip && ./aws/install
    - aws configure set aws_access_key_id $AWS_ACCESS_KEY_ID
    - aws configure set aws_secret_access_key $AWS_SECRET_ACCESS_KEY
    - aws configure set region $AWS_REGION

# ─── SHARED BUILD+PUSH TEMPLATE ──────────────────────────────
.docker_build_push: &docker_build_push
  image: docker:24
  services:
    - docker:24-dind
  <<: *aws_setup
  script:
    - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY
    - docker build -t $ECR_REGISTRY/$SERVICE_NAME:$CI_COMMIT_SHORT_SHA -t $ECR_REGISTRY/$SERVICE_NAME:latest ./backend/services/$SERVICE_NAME
    - docker push $ECR_REGISTRY/$SERVICE_NAME:$CI_COMMIT_SHORT_SHA
    - docker push $ECR_REGISTRY/$SERVICE_NAME:latest

# ─── STAGE: TEST ─────────────────────────────────────────────

test:user-service:
  stage: test
  image: node:20-alpine
  only:
    - master
    - develop
    - merge_requests
  services: *postgres_service
  before_script: *load_schema
  script:
    - cd backend/services/user-service
    - npm ci
    - npm test
  variables:
    DATABASE_URL: postgresql://postgres:postgres@postgres:5432/skillbridge
    JWT_SECRET: testsecret

test:profile-service:
  stage: test
  image: node:20-alpine
