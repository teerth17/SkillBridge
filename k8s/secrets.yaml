# ============================================================
# Secrets — DO NOT commit real values to Git.
# This file is a TEMPLATE only. Real secrets are created by
# the CI/CD pipeline's deploy stage using GitLab CI variables.
#
# To create manually (local/bootstrap):
#   kubectl create secret generic skillbridge-secrets \
#     --namespace=skillbridge \
#     --from-literal=JWT_SECRET="your_jwt_secret_here" \
#     --from-literal=INTERNAL_SERVICE_TOKEN="your_token_here" \
#     --from-literal=DB_PASSWORD="your_rds_password" \
#     --from-literal=DATABASE_URL="postgresql://postgres:PASSWORD@RDS_ENDPOINT:5432/skillbridge"
#
# Values below are base64-encoded PLACEHOLDERS.
# Generate real ones with:  echo -n "your_value" | base64
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: skillbridge-secrets
  namespace: skillbridge
type: Opaque
data:
  # echo -n "your_actual_jwt_secret" | base64
  JWT_SECRET: REPLACE_WITH_BASE64_ENCODED_SECRET

  # echo -n "your_internal_token" | base64
  INTERNAL_SERVICE_TOKEN: REPLACE_WITH_BASE64_ENCODED_TOKEN

  # echo -n "your_rds_password" | base64
  DB_PASSWORD: REPLACE_WITH_BASE64_ENCODED_DB_PASSWORD

  # echo -n "postgresql://postgres:PASSWORD@your-rds-endpoint.rds.amazonaws.com:5432/skillbridge" | base64
  DATABASE_URL: REPLACE_WITH_BASE64_ENCODED_DATABASE_URL
