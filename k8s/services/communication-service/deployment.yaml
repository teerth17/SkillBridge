# ============================================================
# communication-service — Socket.IO (real-time chat)
#
# STICKY SESSIONS: Socket.IO requires that a client always hits
# the same pod during a connection lifecycle. With multiple
# replicas we use the AWS ALB stickiness annotation on the
# Ingress, and set sessionAffinity: ClientIP here as a fallback
# for internal ClusterIP traffic.
#
# For true horizontal scaling beyond 2 replicas, add a Redis
# adapter: npm install @socket.io/redis-adapter
# and set REDIS_URL env var pointing to an ElastiCache instance.
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: communication-service
  namespace: skillbridge
  labels:
    app: communication-service
spec:
  # Keep at 1 replica unless you add the Redis Socket.IO adapter.
  # With Redis adapter you can safely scale to 3+.
  replicas: 1
  selector:
    matchLabels:
      app: communication-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: communication-service
    spec:
      containers:
        - name: communication-service
          image: ACCOUNT_ID.dkr.ecr.REGION.amazonaws.com/communication-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4004
          env:
            - name: PORT
              value: "4004"
            - name: NODE_ENV
              value: production
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: skillbridge-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: skillbridge-secrets
                  key: JWT_SECRET
            - name: INTERNAL_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: skillbridge-secrets
                  key: INTERNAL_SERVICE_TOKEN
            - name: AUTH_SERVICE_URL
              value: "http://user-service:4000"
            - name: SESSION_SERVICE_URL
              value: "http://session-service:4002"
            # Uncomment when Redis adapter is added:
            # - name: REDIS_URL
            #   value: "redis://your-elasticache-endpoint:6379"
          readinessProbe:
            httpGet:
              path: /health
              port: 4004
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 4004
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
