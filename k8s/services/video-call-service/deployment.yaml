apiVersion: apps/v1
kind: Deployment
metadata:
  name: video-call-service
  namespace: skillbridge
  labels:
    app: video-call-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: video-call-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: video-call-service
    spec:
      containers:
        - name: video-call-service
          image: ACCOUNT_ID.dkr.ecr.REGION.amazonaws.com/video-call-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4006
          env:
            - name: PORT
              value: "4006"
            - name: NODE_ENV
              value: production
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: skillbridge-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: skillbridge-secrets
                  key: JWT_SECRET
            - name: INTERNAL_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: skillbridge-secrets
                  key: INTERNAL_SERVICE_TOKEN
            # Service URLs — mirrors docker-compose exactly
            - name: AUTH_SERVICE_URL
              value: "http://user-service:4000"
            - name: SESSION_SERVICE_URL
              value: "http://session-service:4002"
            - name: COMMUNICATION_SERVICE_URL
              value: "http://communication-service:4004"
            # ⬇ UPDATE after Jitsi EC2 is provisioned.
            # Set JITSI_BASE_URL as a GitLab CI variable so the pipeline
            # can inject the real EC2 public IP without editing this file.
            - name: JITSI_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: skillbridge-config
                  key: JITSI_BASE_URL
          readinessProbe:
            httpGet:
              path: /health
              port: 4006
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 4006
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
