# ============================================================
# Ingress — AWS ALB Controller
# Routes external HTTPS traffic to each microservice.
#
# Prerequisites:
#   1. AWS Load Balancer Controller installed in the cluster
#   2. An ACM certificate for your domain (for TLS)
#   3. Replace skillbridge.yourdomain.com with your real domain
#      OR remove the host: line to use the ALB DNS name directly
#      (useful for thesis demo before you have a domain)
# ============================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: skillbridge-ingress
  namespace: skillbridge
  annotations:
    # ALB controller
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip

    # TLS — comment out ssl-redirect if you don't have an ACM cert yet
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    # alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:REGION:ACCOUNT:certificate/YOUR-CERT-ID

    # Health check — all services expose GET /health
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "15"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "3"

    # Sticky sessions for Socket.IO (communication-service)
    alb.ingress.kubernetes.io/target-group-attributes: >-
      stickiness.enabled=true,
      stickiness.type=lb_cookie,
      stickiness.lb_cookie.duration_seconds=86400

spec:
  rules:
    - http:
        paths:
          # ── Auth / User ──────────────────────────────────────
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: user-service
                port:
                  number: 4000

          - path: /users
            pathType: Prefix
            backend:
              service:
                name: user-service
                port:
                  number: 4000

          # ── Profiles ─────────────────────────────────────────
          - path: /profiles
            pathType: Prefix
            backend:
              service:
                name: profile-service
                port:
                  number: 4001

          - path: /skills
            pathType: Prefix
            backend:
              service:
                name: profile-service
                port:
                  number: 4001

          # ── Sessions ─────────────────────────────────────────
          - path: /sessions
            pathType: Prefix
            backend:
              service:
                name: session-service
                port:
                  number: 4002

          - path: /connections
            pathType: Prefix
            backend:
              service:
                name: session-service
                port:
                  number: 4002

          # ── Search ───────────────────────────────────────────
          - path: /search
            pathType: Prefix
            backend:
              service:
                name: search-service
                port:
                  number: 4003

          # ── Communication (REST + Socket.IO) ─────────────────
          - path: /messages
            pathType: Prefix
            backend:
              service:
                name: communication-service
                port:
                  number: 4004

          # Socket.IO upgrade path — must be listed explicitly
          - path: /socket.io
            pathType: Prefix
            backend:
              service:
                name: communication-service
                port:
                  number: 4004

          # ── Analytics ────────────────────────────────────────
          - path: /analytics
            pathType: Prefix
            backend:
              service:
                name: analytics-service
                port:
                  number: 4005

          - path: /reviews
            pathType: Prefix
            backend:
              service:
                name: analytics-service
                port:
                  number: 4005

          # ── Video Calls ──────────────────────────────────────
          - path: /video
            pathType: Prefix
            backend:
              service:
                name: video-call-service
                port:
                  number: 4006

          # ── Frontend (catch-all — must be last) ──────────────
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
